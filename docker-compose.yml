services:
  backend:
    build: .
    container_name: aurastay-backend
    ports:
      - "3000:3000"
    volumes:
      - ./server:/app/server
    restart: always

  frontend:
    image: nginx:alpine
    container_name: aurastay-frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    restart: always